<!DOCTYPE html>
<html>
<head>
  <title>Post Room - RentEasy Kenya</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
</head>

<body style="font-family: Arial; text-align:center; padding:20px;">

  <h2>Post a Room</h2>

  <input type="text" id="title" placeholder="Room Title"><br><br>
  <input type="text" id="location" placeholder="Location"><br><br>
  <input type="number" id="price" placeholder="Price"><br><br>

  <button onclick="postRoom()">Post Room</button>

  <p id="message"></p>

  <script>
    const supabaseUrl = "sb_publishable_3PbuC2qrGFLhykHnxJ8GfQ_J7rwARww";
    const supabaseKey ="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9ud2dmY3pxanVpYXN1cW5vcGVoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE2NzEwMjMsImV4cCI6MjA5NzI0NzAyM30.BOXhpNtkruM-bBIaJYDbmwDEL5KqoFn-7c6MxXkDvtA";

    const supabase = window.supabase.createClient(supabaseUrl, supabaseKey);

    async function postRoom() {
      const title = document.getElementById("title").value;
      const location = document.getElementById("location").value;
      const price = document.getElementById("price").value;

      const { error } = await supabase
        .from("rooms")
        .insert([{ title, location, price }]);

      document.getElementById("message").innerText =
        error ? error.message : "Room posted successfully!";
    }
  </script>

</body>
</html>
