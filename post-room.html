<!DOCTYPE html>
<html>
<head>
  <title>Post Room</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <!-- Supabase -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
</head>

<body style="font-family: Arial; text-align:center; padding:20px;">

  <h2>📢 Post a Room</h2>

  <input type="text" id="title" placeholder="Room Title"><br><br>
  <input type="text" id="location" placeholder="Location"><br><br>
  <input type="number" id="price" placeholder="Price"><br><br>

  <button onclick="postRoom()">Post Room</button>

  <p id="message"></p>

  <script>
    // 🔴 SAME KEYS AS INDEX.HTML
    const SUPABASE_KEY = "https://sb_publishable_3PbuC2qrGFLhykHnxJ8GfQ_J7rwARww.supabase.co";
    const SUPABASE_URL = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9ud2dmY3pxanVpYXN1cW5vcGVoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE2NzEwMjMsImV4cCI6MjA5NzI0NzAyM30.BOXhpNtkruM-bBIaJYDbmwDEL5KqoFn-7c6MxXkDvtA";

    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    async function postRoom() {
      const title = document.getElementById("title").value;
      const location = document.getElementById("location").value;
      const price = document.getElementById("price").value;

      const user = await supabase.auth.getUser();

      if (!user.data.user) {
        document.getElementById("message").innerText = "You must be logged in!";
        return;
      }

      const { data, error } = await supabase
        .from("rooms")
        .insert([
          {
            title: title,
            location: location,
            price: price,
            user_id: user.data.user.id
          }
        ]);

      if (error) {
        document.getElementById("message").innerText = error.message;
      } else {
        document.getElementById("message").innerText = "Room posted successfully!";
      }
    }
  </script>

</body>
</html>
