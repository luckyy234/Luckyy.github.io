<!DOCTYPE html>
<html>
<head>

  <!-- ✅ Supabase library -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
</head>

<body style="font-family: Arial; text-align:center; padding:20px;">

  <h1>🏠 RentEasy Kenya</h1>
  <p>Login Test</p>

  <input type="email" id="email" placeholder="Email"><br><br>
  <input type="password" id="password" placeholder="Password"><br><br>

  <button onclick="login()">Login</button>

  <script>
    // 🔴 TEST FIRST: see if JS is working
    alert("JS Loaded");

    // ✅ Supabase setup (PUT YOUR REAL KEYS)
    const supabase = window.supabase.createClient(
      "https://sb_publishable_3PbuC2qrGFLhykHnxJ8GfQ_J7rwARww.supabase.co",
      "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9ud2dmY3pxanVpYXN1cW5vcGVoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE2NzEwMjMsImV4cCI6MjA5NzI0NzAyM30.BOXhpNtkruM-bBIaJYDbmwDEL5KqoFn-7c6MxXkDvtA"
    );

    async function login() {
      alert("Button clicked");

      const email = document.getElementById("email").value;
      const password = document.getElementById("password").value;

      const { data, error } = await supabase.auth.signInWithPassword({
        email: email,
        password: password
      });

      if (error) {
        alert("Error: " + error.message);
      } else {
        alert("Login success");
      }
    }
  </script>

</body>
</html>
